<div class="app-login-container" [ngClass]="brand">

  <!-- ===================================================================
       1. NAVBAR SUPERIOR (CARACOL O DITÚ)
       =================================================================== -->
  <header class="app-navbar">
    
    <!-- LADO IZQUIERDO: LOGO SECUNDARIO Y NAVEGACIÓN -->
    <div class="navbar-left">
      <!-- Muestra el logo de Caracol si brand === 'caracol' -->
      

      <!-- Muestra el logo de Ditú si brand === 'ditu' -->
      <a class="logo-link" *ngIf="brand === 'ditu'">
        <img src="https://caracoltv.brightspotcdn.com/dims4/default/7869f1f/2147483647/strip/true/crop/253x83+0+0/resize/253x83!/format/webp/quality/75/?url=https%3A%2F%2Fcaracol-brightspot.s3.us-west-2.amazonaws.com%2Fcf%2F3b%2F85a87fa34e7ea6a1e855b5dd19d4%2Fctv.png" 
             alt="Ditú" class="brand-logo ditu-logo">
      </a>
      
      <!-- Enlaces del Navbar -->
      <nav class="nav-links">
        <a class="nav-link active">Inicio</a>
        <a class="nav-link">Programas</a>
        <a class="nav-link">Actualidad</a>
        <a class="nav-link">Desafío</a>
        <a class="nav-link live"><span class="red-dot"></span>En vivo</a>
        <a class="nav-link">Novelas</a>
        <a class="nav-link">Humor</a>
        <span class="more-dots">•••</span>
      </nav>
    </div>

    <!-- LADO DERECHO: BÚSQUEDA Y BOTÓN INGRESAR -->
    <div class="navbar-right">
      <button type="button" class="search-btn" aria-label="Buscar">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>

      <button type="button" class="ingresar-header-btn">
        Ingresar
      </button>
    </div>
  </header>

  <!-- ===================================================================
       2. CUERPO PRINCIPAL DEL LOGIN
       =================================================================== -->
  <main class="login-body">
    <div class="login-card">
      
      <h1 class="login-title">¡NOS ENCANTA QUE ESTÉS AQUÍ!</h1>
      <p class="login-subtitle">Empecemos con tu correo</p>

      <!-- Mensaje de Error dinámico desde tu TS -->
      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- FORMULARIO DE ACCESO (Vinculado a tus métodos ROPC) -->
      <form (ngSubmit)="onLogin()" class="login-form" #loginForm="ngForm">
        
        <div class="input-group">
          <input type="email" 
                 name="username" 
                 [(ngModel)]="username" 
                 placeholder="jj@gmail.com" 
                 class="caracol-input" 
                 [disabled]="isLoading"
                 required>
          <span class="input-icon">✉</span>
        </div>

        <div class="input-group">
          <input type="password" 
                 name="password" 
                 [(ngModel)]="password" 
                 placeholder="Contraseña" 
                 class="caracol-input" 
                 [disabled]="isLoading"
                 required>
        </div>

        <button type="submit" class="continuar-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Continuar</span>
          <span *ngIf="isLoading">Cargando...</span>
        </button>
      </form>

      <div class="form-divider"></div>

      <!-- BOTONES SOCIALES OUTLINED (Vinculados a tu onSocialLogin) -->
      <div class="social-login-section">
        <p class="social-text">Accede usando tu cuenta de</p>
        
        <div class="social-buttons-row">
          
          <!-- Botón Google -->
          <button type="button" 
                  class="social-icon-button" 
                  (click)="onSocialLogin('google')" 
                  [disabled]="isLoading" 
                  aria-label="Ingresar con Google">
            <span class="icon-text">G</span>
          </button>

          <!-- Botón Facebook -->
          <button type="button" 
                  class="social-icon-button" 
                  (click)="onSocialLogin('facebook')" 
                  [disabled]="isLoading" 
                  aria-label="Ingresar con Facebook">
            <span class="icon-text">f</span>
          </button>

        </div>
      </div>

    </div>
  </main>

</div>
