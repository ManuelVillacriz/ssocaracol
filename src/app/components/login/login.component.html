<div class="welcome-wrapper">
  
  <div class="welcome-card-premium" [ngClass]="{'brand-ditu': brand === 'ditu', 'brand-caracol': brand === 'caracol'}">
    
    <div class="logo-container">
      <img *ngIf="brand === 'ditu'" 
           src="assets/images/caracol.png" 
           class="brand-logo ditu-logo" 
           alt="Ditu por Caracol">
      
      
    </div>

    <div class="welcome-message">
      <span class="welcome-tag">Inicio de Sesión</span>
      <h1 class="welcome-title">Portal Empresarial</h1>
      <p class="welcome-subtitle">Ingresa tus credenciales de red corporativas</p>
    </div>
    
    <form (ngSubmit)="onLogin()" class="login-form" #loginForm="ngForm">
      
      <div *ngIf="errorMessage" class="error-alert">
        <span class="error-icon">⚠️</span> {{ errorMessage }}
      </div>

      <div class="input-group">
        <label for="username">Usuario Corporativo</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="username" 
          placeholder="ej: mlopez" 
          required 
          autocomplete="username">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="••••••••••••" 
          required>
      </div>

      <button type="submit" class="submit-button" [disabled]="isLoading">
        <span *ngIf="!isLoading">Ingresar</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

    </form>

    <!-- NUEVO: Divisor visual para Social Login -->
    <div class="social-divider">
      <span>O ingresa con</span>
    </div>

    <!-- NUEVO: Botón Premium de Google -->
    <button type="button" class="google-login-button" (click)="onSocialLogin('google')" [disabled]="isLoading">
      <!-- Logo SVG oficial de Google (G de colores) -->
      <svg class="google-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18px" height="18px">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.64 24.32c0-1.55-.13-3.04-.36-4.5H24v9h12.72c-.55 2.91-2.21 5.38-4.69 7.04l7.25 5.62c4.24-3.92 6.68-9.69 6.68-16.16z"/>
        <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.25-5.62c-2.21 1.48-5.02 2.37-8.64 2.37-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      <span>Continuar con Google</span>
    </button>

    <div class="divider-line"></div>
    
    <span class="valorem-tag">Caracol Televisión • Grupo Valorem</span>
  </div>
</div>
